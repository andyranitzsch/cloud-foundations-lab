name: validate

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config > /dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt ruff

      - name: Lint Python (ruff)
        run: ruff check scripts/ tests/ || true   # warning-only por ahora

      - name: Validate Python syntax
        run: python -m compileall scripts/ tests/

      - name: Run unit tests
        run: pytest -q

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.4"

      - name: Tofu fmt (check)
        run: tofu fmt -check -recursive -diff iac/

      - name: Tofu validate (per stack)
        run: |
          for stack in iac/aws iac/gcp iac/azure; do
            echo "=== Validando $stack ==="
            (cd "$stack" && tofu init -backend=false -input=false -no-color && tofu validate -no-color)
          done
